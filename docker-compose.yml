networks:
  game_net:
    driver: bridge

services:
  server:
    build: .
    ports:
      - "50054:50054"
    environment:
      - GRPC_PORT=50054
      - BOARD_SIZE=4
      - MAX_ROUNDS=3
      - DATA_DIR=/app/data
    volumes:
      - ./data:/app/data
    networks:
      - game_net
    command: python3 server/memory_server.py
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import grpc; grpc.insecure_channel('localhost:50054').channel_ready()"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    ports:
      - "8080:8080"
    environment:
      - WEB_PORT=8080
    depends_on:
      server:
        condition: service_healthy
    networks:
      - game_net
    command: python3 web_client/app.py

  # Clientes interactivos: docker compose run --rm player1
  player1:
    build: .
    environment:
      - SERVER_HOST=server
      - SERVER_PORT=50054
    depends_on:
      server:
        condition: service_healthy
    networks:
      - game_net
    stdin_open: true
    tty: true
    command: python3 client/memory_client.py

  player2:
    build: .
    environment:
      - SERVER_HOST=server
      - SERVER_PORT=50054
    depends_on:
      server:
        condition: service_healthy
    networks:
      - game_net
    stdin_open: true
    tty: true
    command: python3 client/memory_client.py

  player3:
    build: .
    environment:
      - SERVER_HOST=server
      - SERVER_PORT=50054
    depends_on:
      server:
        condition: service_healthy
    networks:
      - game_net
    stdin_open: true
    tty: true
    command: python3 client/memory_client.py
