syntax = "proto3";

package memory;

service MemoryGame {
  // Unirse a una sala (room_id vacío o "random" = matchmaking)
  rpc JoinGame (PlayerRequest) returns (PlayerResponse);

  // El host de la sala configura tablero, jugadores y rondas
  rpc ConfigureGame (ConfigRequest) returns (ConfigReply);

  // Voltear la primera carta (opcional, pre-revela símbolo para todos)
  rpc SelectCard (SelectRequest) returns (SelectReply);

  // Realizar una jugada (voltear dos cartas)
  rpc PlayTurn (MoveRequest) returns (MoveReply);

  // Suscribirse a actualizaciones en tiempo real de una sala
  rpc SubscribeToUpdates (SubscribeRequest) returns (stream GameState);

  // Obtener estadísticas de una sala
  rpc GetStatistics (StatsRequest) returns (StatsResponse);

  // Listar salas activas
  rpc ListRooms (Empty) returns (RoomListResponse);

  // Ranking global (all-time, from SQLite)
  rpc GetRanking (Empty) returns (RankingResponse);
}

message PlayerRequest {
  string name = 1;
  string room_id = 2; // "" o "random" = matchmaking; cualquier otro = sala nombrada
}

message PlayerResponse {
  string player_id = 1;
  int32  board_size = 2;
  string room_id = 3;
  bool   is_host = 4;   // true si este jugador es el host de la sala
}

message SubscribeRequest {
  string player_id = 1;
  string room_id = 2;
}

message StatsRequest {
  string room_id = 1;
}

message RoomInfo {
  string room_id = 1;
  string status = 2;
  int32 player_count = 3;
  int32 max_players = 4;  // 0 = no configurado aún
}

message RoomListResponse {
  repeated RoomInfo rooms = 1;
}

message SelectRequest {
  string player_id = 1;
  int32 r = 2;
  int32 c = 3;
}

message SelectReply {
  bool valid = 1;
  string message = 2;
}

message MoveRequest {
  string player_id = 1;
  int32 r1 = 2;
  int32 c1 = 3;
  int32 r2 = 4;
  int32 c2 = 5;
  float lat_red_ms = 6;  // latencia de red medida en el cliente web (ms)
}

message MoveReply {
  bool valid = 1;
  string message = 2;
  bool match = 3;
}

message Card {
  int32 r = 1;
  int32 c = 2;
  string symbol = 3;
  bool flipped = 4;
  bool matched = 5;
}

message GameState {
  repeated Card board = 1;
  string current_player_id = 2;
  string current_player_name = 3;
  string status = 4; // "LOBBY", "WAITING", "PLAYING", "ROUND_OVER", "FINISHED"
  map<string, int32> scores = 5;
  string room_id = 6;
  int32 round = 7;        // current round number (1-based)
  int32 max_rounds = 8;   // total rounds in this room
  string host_id = 9;     // player_id del host
  int32 max_players = 10; // jugadores necesarios para empezar
  int32 board_size = 11;  // tamaño NxN del tablero actual
}

// ── Configurar sala (solo el host) ───────────────────────────────
message ConfigRequest {
  string player_id = 1;
  int32  board_size = 2;
  int32  max_players = 3;
  int32  max_rounds = 4;
}

message ConfigReply {
  bool   valid = 1;
  string message = 2;
}

message PlayerStats {
  string name = 1;
  int32 score = 2;
  int32 total_moves = 3;
  float avg_response_time = 4;
}

message StatsResponse {
  repeated PlayerStats rankings = 1;
}

message RankingEntry {
  string player_name = 1;
  int32  total_score = 2;
  int32  rounds_played = 3;
  int32  total_moves = 4;
  float  avg_response_time = 5;
}

message RankingResponse {
  repeated RankingEntry entries = 1;
}

message Empty {}
